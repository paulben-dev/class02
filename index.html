        return;
      }

      var html = '<div class="modal-content" style="max-height:70vh;"><span class="modal-close" onclick="closeSubscribeModal()"><svg class="icon"><use href="#icon-x"/></svg></span><h3 style="margin-bottom:12px;"><svg class="icon"><use href="#icon-camera"/></svg> 批改记录</h3>';
      html += '<p style="font-size:12px;color:var(--text-hint);margin-bottom:8px;">共' + graded.length + '次批改</p>';
      graded.forEach(function(hw) {
        var r = mockData.gradingResults[hw.id];
        var subj = mockData.subjects.find(function(s) { return s.id === hw.subjectId; });
        var dp = r.gradedAt.split('-');
        var dateStr = parseInt(dp[1]) + '月' + parseInt(dp[2]) + '日';
        html += '<div class="menu-item" onclick="closeSubscribeModal();switchPage(\'report\');setTimeout(function(){document.getElementById(\'report-hw-select\').value=\'' + hw.id + '\';showReport();},100);" style="flex-direction:column;align-items:flex-start;gap:4px;">';
        html += '<div style="display:flex;justify-content:space-between;width:100%;">';
        html += '<span><span class="hw-subject-badge" style="background:' + (subj?subj.color:'#999') + ';font-size:10px;">' + (subj?subj.name:'') + '</span> ' + hw.title + '</span>';
        html += '<span style="font-weight:700;color:var(--primary);">' + getGradeLetter(r.score).letter + '</span>';
        html += '</div>';
        html += '<span style="font-size:11px;color:var(--text-hint);"><svg class="icon"><use href="#icon-calendar"/></svg> ' + dateStr + ' · <svg class="icon"><use href="#icon-check-circle"/></svg>' + r.correctCount + ' <svg class="icon"><use href="#icon-x-circle"/></svg>' + (r.wrongCount||0) + ' <svg class="icon"><use href="#icon-alert-triangle"/></svg>' + (r.partialCount||0) + '</span>';
        html += '</div>';
      });
      html += '</div>';
      var overlay = document.getElementById('modal-overlay');
      overlay.innerHTML = html;
      overlay.style.display = 'flex';
    }

    function handleAvatarUpload(event, who) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const dataUrl = e.target.result;
        if (who === 'parent') {
          mockData.user.avatar = dataUrl;
        } else {
          mockData.user.child.avatar = dataUrl;
        }
        renderAvatar(who, dataUrl);
        saveState();
        showToast('头像已更新');
      };
      reader.readAsDataURL(file);
      event.target.value = '';
    }

    function renderAvatar(who, dataUrl) {
      const container = document.getElementById(who === 'parent' ? 'parent-avatar' : 'child-avatar');
      const placeholder = container.querySelector('.avatar-placeholder');
      const img = container.querySelector('.avatar-img');
      if (dataUrl) {
        placeholder.style.display = 'none';
        img.src = dataUrl;
        img.style.display = 'block';
      } else {
        placeholder.style.display = '';
        img.style.display = 'none';
      }
    }

    function initProfile() {
      document.getElementById('profile-name').textContent = mockData.user.name;
      renderAvatar('parent', mockData.user.avatar);
      document.getElementById('child-name').textContent = mockData.user.child.name;
      document.getElementById('child-info').textContent =
        mockData.user.child.grade + ' · ' + mockData.user.child.className;
      renderAvatar('child', mockData.user.child.avatar);

      updateSubscriptionUI();
    }

    function updateSubscriptionUI() {
      const statusTitle = document.getElementById('sub-status-title');
      const statusDesc = document.getElementById('sub-status-desc');
      const btn = document.getElementById('btn-subscribe-top');
      if (!statusTitle) return;

      if (mockData.user.isSubscribed) {
        var isPremium = mockData.user.subscriptionTier === 2;
        var tierName = isPremium ? '高级会员' : '基础会员';
        statusTitle.innerHTML = '<svg class="icon"><use href="#icon-check-circle"/></svg> ' + tierName;
        statusDesc.textContent = '有效期至 ' + (mockData.user.subscriptionExpiry || '--');
        btn.textContent = isPremium ? '会员续费' : '升级';
        btn.classList.remove('btn-accent');
        btn.classList.add('btn-outline');
      } else {
        statusTitle.textContent = '免费试用中';
        statusDesc.textContent = '基础会员 ¥9.9/月 · 高级会员 ¥19.9/月';
        btn.textContent = '立即订阅';
        btn.classList.remove('btn-outline');
        btn.classList.add('btn-accent');
      }
    }

    // ============================================================
    // Subscription Modal & Paywall
    // ============================================================
    function showSubscribeModal() {
      var overlay = document.getElementById('modal-overlay');
      if (!overlay) { console.error('modal-overlay not found'); return; }
      var isRenewal = mockData.user.isSubscribed;
      var currentTier = mockData.user.subscriptionTier || 0;
      var currentExpiry = mockData.user.subscriptionExpiry || '';

      // Shared feature list with per-tier inclusion
      var allFeatures = [
        { text: '无限错题回顾', basic: true, premium: true },
        { text: '详细思路点拨', basic: true, premium: true },
        { text: 'AI 薄弱点精准分析', basic: true, premium: true },
        { text: '每周/每月学情报告', basic: true, premium: true },
        { text: '专属定制练习卷', basic: false, premium: true },
        { text: 'AI智能组卷', basic: false, premium: true },
      ];

      var renderTierFeatures = function(included) {
        return allFeatures.map(function(f) {
          var icon = f[included]
            ? '<svg class="icon" style="color:var(--success);"><use href="#icon-check"/></svg>'
            : '<svg class="icon" style="color:#ccc;"><use href="#icon-x"/></svg>';
          var cls = f[included] ? '' : ' style="color:#bbb;"';
          return '<div class="sub-feature"' + cls + '>' + icon + ' ' + f.text + '</div>';
        }).join('');
      };

      var isUpgrade = isRenewal && currentTier === 1;
      var upgradePrice = isUpgrade ? '10.0' : '0'; // diff between ¥19.9 and ¥9.9

      var tierLabel = isRenewal
        ? (currentTier === 2 ? '当前为高级会员' : '当前为基础会员 · 可升级高级会员解锁专属定制')
        : '';

      var htmlParts = [];
      htmlParts.push('<div class="modal-content" id="subscribe-modal" onclick="event.stopPropagation()">');
      htmlParts.push('<span class="modal-close" onclick="closeSubscribeModal()"><svg class="icon"><use href="#icon-x"/></svg></span>');
      htmlParts.push('<div style="text-align:center;margin-bottom:16px;">');
      htmlParts.push('<div style="font-size:40px;"><svg class="icon"><use href="#icon-crown"/></svg></div>');
      htmlParts.push('<h3>' + (isUpgrade ? '升级高级会员' : isRenewal ? '续费会员' : '解锁全部功能') + '</h3>');
      htmlParts.push('<p style="color:var(--text-hint);font-size:13px;margin-top:4px;">' + (isRenewal ? tierLabel + ' · 有效期至 ' + currentExpiry : '提升孩子学习效率') + '</p>');
      if (isUpgrade) htmlParts.push('<p style="color:var(--accent);font-size:12px;margin-top:4px;font-weight:500;">升级仅需补差价，原基础会员剩余时长保留</p>');
      htmlParts.push('</div>');
      htmlParts.push('<div style="display:flex;gap:10px;margin-bottom:14px;">');
      // Basic tier
      htmlParts.push('<div class="tier-card" id="tier-basic" onclick="selectTier(1)" style="flex:1;">');
      if (currentTier === 1) htmlParts.push('<span class="tier-current">当前</span>');
      htmlParts.push('<div style="font-size:15px;font-weight:600;">基础会员</div>');
      htmlParts.push('<div style="font-size:24px;font-weight:700;color:var(--primary);margin:4px 0;">¥9.9<span style="font-size:12px;color:var(--text-hint);font-weight:400;">/月</span></div>');
      htmlParts.push('<div class="sub-features" style="margin-top:8px;background:transparent;padding:0;">');
      htmlParts.push(renderTierFeatures('basic'));
      htmlParts.push('</div></div>');
      // Premium tier
      htmlParts.push('<div class="tier-card" id="tier-premium" onclick="selectTier(2)" style="flex:1;">');
      if (currentTier === 2) htmlParts.push('<span class="tier-current">当前</span>');
      else if (isUpgrade) htmlParts.push('<span class="tier-tag">升级</span>');
      else htmlParts.push('<span class="tier-tag">推荐</span>');
      htmlParts.push('<div style="font-size:15px;font-weight:600;">高级会员</div>');
      htmlParts.push('<div style="font-size:24px;font-weight:700;color:var(--accent);margin:4px 0;">¥19.9<span style="font-size:12px;color:var(--text-hint);font-weight:400;">/月</span></div>');
      htmlParts.push('<div class="sub-features" style="margin-top:8px;background:transparent;padding:0;">');
      htmlParts.push(renderTierFeatures('premium'));
      htmlParts.push('</div></div>');
      htmlParts.push('</div>');
      htmlParts.push('<div style="display:flex;gap:8px;margin-top:12px;" id="duration-row">');
      htmlParts.push('<div class="duration-btn selected" data-dur="1" onclick="selectDuration(this, 1)">月度</div>');
      htmlParts.push('<div class="duration-btn" data-dur="3" onclick="selectDuration(this, 3)">季度<span class="dur-saving"></span></div>');
      htmlParts.push('<div class="duration-btn" data-dur="12" onclick="selectDuration(this, 12)">年度<span class="dur-saving"></span></div>');
      htmlParts.push('</div>');
      htmlParts.push('<button class="btn btn-accent btn-block" id="btn-do-subscribe" onclick="doSubscribe()" style="margin-top:12px;">');
      htmlParts.push('<svg class="icon"><use href="#icon-coins"/></svg> ' + (isUpgrade ? '确认升级' : isRenewal ? '确认续费' : '立即订阅'));
      htmlParts.push('</button>');
      htmlParts.push('<p style="text-align:center;font-size:11px;color:var(--text-hint);margin-top:8px;">演示版：点击即模拟支付成功</p>');
      if (isRenewal) htmlParts.push('<p style="text-align:center;margin-top:8px;"><span style="color:var(--danger);cursor:pointer;font-size:12px;" onclick="cancelSubscribe()">取消自动续费</span></p>');
      htmlParts.push('</div>');
      overlay.innerHTML = htmlParts.join('');

      overlay.style.display = 'flex';

      // Default: free→basic, basic→premium (encourage upgrade), premium→premium
      window._selectedTier = currentTier === 2 ? 2 : (currentTier === 1 ? 2 : 1);
      window._selectedMonths = 1;
      setTimeout(function() {
        selectTier(window._selectedTier);
        updatePriceButton();
      }, 50);
    }

    // Price table: [tier][months] = total price
    var PRICE_TABLE = {
      1: { 1: 9.9,  3: 22.9, 12: 69 },
      2: { 1: 19.9, 3: 45.9, 12: 149 },
    };

    function getPlanPrice(tier, months) {
      return PRICE_TABLE[tier] ? (PRICE_TABLE[tier][months] || 0) : 0;
    }

    function selectTier(tier) {
      window._selectedTier = tier;
      document.querySelectorAll('.tier-card').forEach(function(c) { c.classList.remove('selected'); });
      var el = document.getElementById(tier === 2 ? 'tier-premium' : 'tier-basic');
      if (el) el.classList.add('selected');
      updatePriceButton();
      updateDurationSavings();
    }

    function selectDuration(el, months) {
      document.querySelectorAll('.duration-btn').forEach(function(d) { d.classList.remove('selected'); });
      el.classList.add('selected');
      window._selectedMonths = months;
      updatePriceButton();
    }

    function updatePriceButton() {
      var btn = document.getElementById('btn-do-subscribe');
      if (!btn) return;
      var tier = window._selectedTier || 1;
      var months = window._selectedMonths || 1;
      var total = getPlanPrice(tier, months);
      var tierName = tier === 2 ? '高级' : '基础';
      if (months === 1) {
        btn.innerHTML = '<svg class="icon"><use href="#icon-coins"/></svg> ¥' + total.toFixed(1) + ' / 月 · ' + tierName;
      } else {
        var unitPrice = (total / months).toFixed(1);
        btn.innerHTML = '<svg class="icon"><use href="#icon-coins"/></svg> ¥' + total.toFixed(1) + ' / ' + months + '个月（约¥' + unitPrice + '/月）· ' + tierName;
      }
    }

    function updateDurationSavings() {
      var tier = window._selectedTier || 1;
      var monthlyPrice = getPlanPrice(tier, 1);
      var btns = document.querySelectorAll('.duration-btn');
      btns.forEach(function(b) {
        var m = parseInt(b.getAttribute('data-dur'));
        if (m === 1) return;
        var planTotal = getPlanPrice(tier, m);
        var regularTotal = monthlyPrice * m;
        var saving = regularTotal - planTotal;
        var savingEl = b.querySelector('.dur-saving');
        if (savingEl) {
          savingEl.textContent = '省¥' + saving.toFixed(1);
        }
      });
    }

    function doSubscribe() {
      var months = window._selectedMonths || 1;
      var tier = window._selectedTier || 1;
      var wasSubscribed = mockData.user.isSubscribed;
      var oldTier = mockData.user.subscriptionTier;

      mockData.user.isSubscribed = true;
      mockData.user.subscriptionTier = tier;
      var expiry = new Date();
      if (wasSubscribed && mockData.user.subscriptionExpiry) {
        expiry = new Date(mockData.user.subscriptionExpiry);
      }
      expiry.setMonth(expiry.getMonth() + months);
      mockData.user.subscriptionExpiry = expiry.toISOString().split('T')[0];
      saveState();
      closeSubscribeModal();
      updateSubscriptionUI();
      renderErrorBook();
      if (currentHwType === 'custom') renderHomeworkList();
      // Auto-refresh the current report tab after subscribe
      if (currentReportTab === 'weekly') showWeeklyReport();
      if (currentReportTab === 'monthly') showMonthlyReport();
      var customTab = document.querySelector('[data-hwtype="custom"]');
      if (customTab) {
        customTab.innerHTML = tier === 2
          ? '<svg class="icon"><use href="#icon-sparkles"/></svg> 专属定制'
          : '专属定制';
      }

      if (wasSubscribed && tier > oldTier) {
        showToast('<svg class="icon"><use href="#icon-party"/></svg> 已升级为高级会员！');
      } else if (wasSubscribed) {
        showToast('<svg class="icon"><use href="#icon-party"/></svg> 续费成功！有效期延长至 ' + mockData.user.subscriptionExpiry);
      } else {
        var tierName = tier === 2 ? '高级' : '基础';
        showToast('<svg class="icon"><use href="#icon-party"/></svg> ' + tierName + '会员订阅成功！');
      }
    }

    function closeSubscribeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    function closeModal(event) {
      if (event.target === document.getElementById('modal-overlay')) {
        document.getElementById('modal-overlay').style.display = 'none';
      }
    }

    function cancelSubscribe() {
      if (confirm('确定取消自动续费吗？到期后将恢复免费试用状态。')) {
        mockData.user.isSubscribed = false;
        mockData.user.subscriptionTier = 0;
        mockData.user.subscriptionExpiry = null;
        saveState();
        closeSubscribeModal();
        updateSubscriptionUI();
        renderErrorBook();
        if (currentHwType === 'custom') renderHomeworkList();
        var customTab = document.querySelector('[data-hwtype="custom"]');
        if (customTab) customTab.textContent = '专属定制';
        showToast('<svg class="icon"><use href="#icon-info"/></svg> 已取消续费');
      }
    }


    // ============================================================
    // Toast Notification
    // ============================================================
    function showToast(message) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = `
          position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
          background: rgba(0,0,0,0.75); color: #fff; padding: 10px 20px;
          border-radius: 20px; font-size: 13px; z-index: 300;
          white-space: nowrap; transition: opacity 0.3s;
        `;
        document.body.appendChild(toast);
      }
      toast.innerHTML = message;
      toast.style.opacity = '1';
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    // ============================================================
    // Share Function
    // ============================================================
    var _shareData = null;

    async function shareReport() {
      if (!_shareData) return;
      var data = _shareData;

      // Try Web Share API (works in WeChat, mobile browsers)
      if (navigator.share) {
        try {
          await navigator.share({
            title: data.title,
            text: data.text,
            url: window.location.href,
          });
          showToast('<svg class="icon"><use href="#icon-check-circle"/></svg> 已分享');
          return;
        } catch (e) {
          if (e.name === 'AbortError') return;
        }
      }

      // Fallback: copy to clipboard
      try {
        await navigator.clipboard.writeText(data.title + '\n' + data.text);
        showToast('<svg class="icon"><use href="#icon-check-circle"/></svg> 已复制到剪贴板');
      } catch (e) {
        showToast('<svg class="icon"><use href="#icon-check-circle"/></svg> 请截图分享给好友');
      }
    }

    // ============================================================
    // Initialization
    // ============================================================
    function init() {
      renderPhotoGrid();
      refreshHomeworkSelector();
      renderHomeworkList();
      populateReportSelector();
      initErrorBook();
      initProfile();
    }

    init();
  </script>
</body>
</html>
